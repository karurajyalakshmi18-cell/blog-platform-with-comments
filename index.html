<!DOCTYPE html>
<html>
<head>
    <title>Blog Platform with Comments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Blog Platform with Comments</h1>

    <div class="blog-post">
        <h2>My First Blog Post</h2>
        <p>
            Welcome to my blog platform project. This project allows users
            to create blog posts and interact through comments.
        </p>
    </div>

    <div class="comments">
        <h3>Comments</h3>

        <textarea id="commentInput" placeholder="Write a comment"></textarea>
        <br>
        <button onclick="addComment()">Post Comment</button>

        <ul id="commentList"></ul>
    </div>

    <script src="script.js"></script>

</body>
</html>
